      - "tasks with figma URLs or node ids"
      - "design-to-code planning"
      - "figma mcp setup"
    should_not_trigger_for:
      - "tasks without design context"
      - "non-figma architecture planning"
    prerequisites:
      - "working Figma MCP connection"
      - "Figma URL or selected node context"
    safe_phase:
      - "planning"
      - "execution"
      - "review"
    mutates_files: "unknown"
    requires_external_context: true
    example_prompt: "Use $figma to inspect the provided Figma node and summarize the relevant design context."
    confidence_of_mapping: "high"

