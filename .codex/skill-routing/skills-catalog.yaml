version: 1
description: "Repo-managed skill routing catalog for supervised planning."
skills:
  - display_name: "Supervisor Plan"
    invocation_name: "supervisor-plan"
    probable_invocation_name: "supervisor-plan"
    invocation_name_status: "confirmed"
    source_scope: "repo"
    primary_use_cases:
      - "read-only supervisor planning"
      - "task decomposition"
      - "routing analysis"
    should_trigger_for:
      - "new task planning"
      - "architecture shaping"
      - "risk analysis"
      - "task breakdown"
    should_not_trigger_for:
      - "approved file mutation"
      - "post-execution review"
    prerequisites:
      - "repository is open in Codex app or terminal"
    safe_phase:
      - "planning"
    mutates_files: false
    requires_external_context: false
    example_prompt: "Use $supervisor-plan to inspect the skill catalog first and then produce a read-only routed plan."
    confidence_of_mapping: "high"

  - display_name: "Supervisor Execute"
    invocation_name: "supervisor-execute"
    probable_invocation_name: "supervisor-execute"
    invocation_name_status: "confirmed"
    source_scope: "repo"
    primary_use_cases:
      - "approved execution handoff"
      - "isolated worktree execution"
    should_trigger_for:
      - "approved plan execution"
      - "bounded implementation handoff"
    should_not_trigger_for:
      - "initial planning"
      - "read-only review"
    prerequisites:
      - "approved plan run id"
      - "explicit supervisor approval note"
      - "git worktree creation must succeed"
    safe_phase:
      - "execution"
    mutates_files: true
    requires_external_context: false
    example_prompt: "Use $supervisor-execute to run only the already approved plan slice in an isolated worktree."
    confidence_of_mapping: "high"

  - display_name: "Supervisor Review"
    invocation_name: "supervisor-review"
    probable_invocation_name: "supervisor-review"
    invocation_name_status: "confirmed"
    source_scope: "repo"
    primary_use_cases:
      - "read-only run review"
      - "post-execution validation"
      - "risk summarization"
    should_trigger_for:
      - "reviewing a planning run"
      - "reviewing an execution run"
      - "reviewing a worktree"
    should_not_trigger_for:
      - "initial implementation"
      - "direct execution"
    prerequisites:
      - "target run id or target path when reviewing a specific result"
    safe_phase:
      - "review"
    mutates_files: false
    requires_external_context: false
    example_prompt: "Use $supervisor-review to review a run or worktree in read-only mode and summarize the findings."
    confidence_of_mapping: "high"

  - display_name: "Figma"
